name: Refresh FilmovéNovinky cache

on:
  workflow_dispatch:
    inputs:
      force_full:
        description: "Run full refresh? true/false"
        required: false
        default: "false"
  schedule:
    # každý deň o 03:20 UTC
    - cron: "20 3 * * *"

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Refresh cache
        run: npm run refresh
        env:
          PORT: 10000
          PUBLIC_URL: https://example.onrender.com
          AUTO_REFRESH: "false"
          REFRESH_ON_START: "false"
          CACHE_TTL_HOURS: 24
          MAX_ITEMS: 1000
          MAX_SERIES: 0
          DISABLE_SERIES: "true"
          REQUEST_TIMEOUT_MS: 15000
          HTTP_RETRIES: 1
          REFRESH_LOCK_TIMEOUT_MS: 180000
          USE_READER_FALLBACK: "true"
          ENABLE_TMDB: ${{ secrets.TMDB_API_KEY != '' && 'true' || 'false' }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          ENRICH_LIMIT: 1000
          TMDB_YEAR_TOLERANCE: 1
          TMDB_SEARCH_LIMIT: 8
          CSFD_SEARCH_FALLBACK: "false"
          HIDE_UNMATCHED_ITEMS: "true"
          FORCE_FULL_REFRESH: ${{ github.event.inputs.force_full || 'false' }}
          MOVIES_SOURCE_URL: https://www.filmovenovinky.sk/nove-filmy/nove-filmy-s-dabingom-cz-sk-zistite-co-pribudlo-dnes
          SERIES_SOURCE_URL: ""

      - name: Commit updated cache
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/catalog-cache.json
          git diff --cached --quiet && echo "No cache changes" || git commit -m "Refresh FilmovéNovinky cache"
          git pull --rebase --autostash
          git push
