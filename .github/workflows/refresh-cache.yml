name: Refresh FilmovéNovinky cache

on:
  workflow_dispatch:
    inputs:
      force_full:
        description: "Run full refresh? true/false"
        required: false
        default: "true"

  schedule:
    - cron: "20 3 * * *"

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Refresh cache with safe repair
        run: npm run refresh-cache-with-safe-repair
        env:
          PORT: 10000
          PUBLIC_URL: ${{ secrets.PUBLIC_URL || 'https://example.onrender.com' }}
          AUTO_REFRESH: "false"
          REFRESH_ON_START: "false"
          CACHE_TTL_HOURS: 24
          MAX_ITEMS: 1000
          MAX_SERIES: 0
          DISABLE_SERIES: "true"
          ENABLE_TMDB: "true"
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_LANGUAGE: cs-CZ
          ENRICH_LIMIT: 1000
          TMDB_YEAR_TOLERANCE: 1
          TMDB_SEARCH_LIMIT: 8
          REQUEST_TIMEOUT_MS: 20000
          HTTP_RETRIES: 2
          REFRESH_LOCK_TIMEOUT_MS: 900000
          HIDE_UNMATCHED_ITEMS: "false"
          STRICT_MOVIE_FILTER: "true"
          REQUIRE_YEAR_FOR_LOCAL_ITEMS: "false"
          CSFD_SEARCH_FALLBACK: "true"
          MOVIES_SOURCE_URL: https://www.filmovenovinky.sk/nove-filmy/nove-filmy-s-dabingom-cz-sk-zistite-co-pribudlo-dnes
          SERIES_SOURCE_URL: ""
          FORCE_FULL_REFRESH: ${{ github.event.inputs.force_full || 'true' }}
          POSTPROCESS_LIMIT: 1000
          POSTPROCESS_DELAY_MS: 200

      - name: Commit updated cache
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/catalog-cache.json
          if git diff --cached --quiet; then
            echo "No cache changes"
            exit 0
          fi
          git commit -m "Refresh FilmovéNovinky cache"
          git pull --rebase --autostash
          git push
