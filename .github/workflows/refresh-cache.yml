name: Refresh FilmovéNovinky cache

on:
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Refresh cache with safe repair
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          REPAIR_LIMIT: 300
          # Ak máš cache inde, odkomentuj a uprav:
          # CACHE_FILE: data/cache.json
        run: npm run refresh-cache-with-safe-repair

      - name: Commit updated cache
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data cache *.json || true
          git commit -m "Refresh cache with safe stream repair" || echo "No changes"
          git push
